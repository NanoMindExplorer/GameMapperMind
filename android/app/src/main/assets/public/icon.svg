<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Gamer Spirit Gradients -->
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <linearGradient id="neonGradient" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" /> <!-- Pink 500 -->
      <stop offset="50%" stop-color="#8b5cf6" /> <!-- Violet 500 -->
      <stop offset="100%" stop-color="#4f46e5" /> <!-- Indigo 600 -->
    </linearGradient>
    <linearGradient id="fireGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <filter id="neonBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Shield/Armor -->
  <rect width="512" height="512" fill="url(#bgGlow)" rx="120" />
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="#312e81" stroke-width="8" rx="104" />

  <g transform="translate(0, 20)">
    <!-- Aura/Glow -->
    <path d="M120 280 C90 280 60 220 80 180 C110 130 180 120 220 160 L256 190 L292 160 C332 120 402 130 432 180 C452 220 422 280 392 280 C360 280 340 320 300 340 L256 360 L212 340 C172 320 152 280 120 280 Z" 
          fill="none" stroke="url(#neonGradient)" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" opacity="0.3" filter="url(#neonBlur)" />

    <!-- Main Gamepad Body (Dynamic Winged shape) -->
    <path d="M110 280 C80 280 70 210 90 170 C120 125 180 115 220 155 L256 185 L292 155 C332 115 392 125 422 170 C442 210 432 280 402 280 C370 280 340 330 300 350 L256 370 L212 350 C172 330 142 280 110 280 Z" 
          fill="url(#neonGradient)" stroke="#ffffff" stroke-width="8" stroke-linejoin="round" />

    <!-- Dynamic Fire Spirit Behind Vector -->
    <g transform="translate(256, 110)">
      <path d="M0 0 Q20 -40 0 -80 Q-20 -40 0 0" fill="url(#fireGradient)" filter="url(#neonBlur)" />
      <path d="M0 -15 Q12 -45 0 -65 Q-12 -45 0 -15" fill="#fef08a" />
      <path d="M-30 20 Q-60 -10 -40 -50 Q-20 -20 -30 20" fill="url(#fireGradient)" opacity="0.8" />
      <path d="M30 20 Q60 -10 40 -50 Q20 -20 30 20" fill="url(#fireGradient)" opacity="0.8" />
    </g>

    <!-- D-Pad Setup -->
    <g transform="translate(150, 190)">
      <path d="M-15 -40 h30 v25 h25 v30 h-25 v25 h-30 v-25 h-25 v-30 h25 z" fill="#0f172a" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" />
      <!-- D-pad accents -->
      <path d="M-5 -30 h10 m-5 -5 v10 M25 -5 v10 m-5 -5 h10 M-5 20 h10 m-5 -5 v10 M-25 -5 v10 m-5 -5 h10" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Action Buttons Setup -->
    <g transform="translate(362, 190)">
      <circle cx="0" cy="-30" r="14" fill="#0f172a" stroke="#ffffff" stroke-width="4"/>
      <circle cx="30" cy="0" r="14" fill="#0f172a" stroke="#ffffff" stroke-width="4"/>
      <circle cx="-30" cy="0" r="14" fill="#0f172a" stroke="#ffffff" stroke-width="4"/>
      <circle cx="0" cy="30" r="14" fill="#0f172a" stroke="#ffffff" stroke-width="4"/>
      <!-- Button Letters (Abstract dashes) -->
      <circle cx="0" cy="-30" r="4" fill="#ec4899"/>
      <circle cx="30" cy="0" r="4" fill="#ec4899"/>
      <circle cx="-30" cy="0" r="4" fill="#6366f1"/>
      <circle cx="0" cy="30" r="4" fill="#6366f1"/>
    </g>

    <!-- Center Hub/Brain -->
    <g transform="translate(256, 230)">
      <circle cx="0" cy="0" r="28" fill="#0f172a" stroke="#ffffff" stroke-width="6" />
      <path d="M-12 -6 L12 6 M-12 6 L12 -6 M0 -12 L0 12" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="8" fill="#ec4899" filter="url(#neonBlur)"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff" />
    </g>

    <!-- Analog Sticks -->
    <g transform="translate(200, 290)">
      <circle cx="0" cy="0" r="24" fill="#0f172a" stroke="#ffffff" stroke-width="4" />
      <circle cx="0" cy="0" r="12" fill="#312e81" stroke="#4f46e5" stroke-width="3" />
      <circle cx="4" cy="-4" r="3" fill="#ffffff" opacity="0.6"/>
    </g>
    <g transform="translate(312, 290)">
      <circle cx="0" cy="0" r="24" fill="#0f172a" stroke="#ffffff" stroke-width="4" />
      <circle cx="0" cy="0" r="12" fill="#312e81" stroke="#4f46e5" stroke-width="3" />
      <circle cx="-4" cy="-4" r="3" fill="#ffffff" opacity="0.6"/>
    </g>

    <!-- Trigger Shoulders -->
    <path d="M120 160 Q150 90 220 145" fill="none" stroke="#ec4899" stroke-width="12" stroke-linecap="round" />
    <path d="M392 160 Q362 90 292 145" fill="none" stroke="#4f46e5" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>

# ============================================================
# GameMapperMind — Android APK Build (Capacitor + Vite + Shizuku)
# ============================================================
name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Android SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build web app (Vite only)
        run: npx vite build

      - name: Verify Capacitor config
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            echo "::error::capacitor.config.ts not found in repo root"
            exit 1
          fi
          echo "✓ Capacitor config OK"

      # ============================================================
      # Clean corrupt PNG files + regenerate all launcher icons
      # Some PNG files in repo are committed with text-mode line endings
      # or are truncated, causing AAPT "file failed to compile" errors.
      # We delete the entire res/mipmap-* and res/drawable* directories
      # and regenerate them from icon.svg via rsvg-convert.
      # ============================================================
      - name: Clean and regenerate launcher icons + splash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin imagemagick

          if [ ! -f "icon.svg" ]; then
            echo "::warning::icon.svg not found, skipping icon generation"
            exit 0
          fi

          echo "Cleaning old launcher icons + splash PNGs..."
          rm -rf android/app/src/main/res/mipmap-*
          rm -rf android/app/src/main/res/drawable
          rm -rf android/app/src/main/res/drawable-*
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/values

          echo "Generating launcher icons from icon.svg..."
          # Standard legacy launcher icons
          rsvg-convert -w 48  -h 48  icon.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          rsvg-convert -w 48  -h 48  icon.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          rsvg-convert -w 72  -h 72  icon.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          rsvg-convert -w 72  -h 72  icon.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          rsvg-convert -w 96  -h 96  icon.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          rsvg-convert -w 96  -h 96  icon.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          rsvg-convert -w 144 -h 144 icon.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          rsvg-convert -w 144 -h 144 icon.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          rsvg-convert -w 192 -h 192 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          rsvg-convert -w 192 -h 192 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

          # Adaptive icon foreground/background (Android 8.0+)
          rsvg-convert -w 108 -h 108 icon.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png
          rsvg-convert -w 108 -h 108 icon.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher_background.png
          rsvg-convert -w 162 -h 162 icon.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          rsvg-convert -w 162 -h 162 icon.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher_background.png
          rsvg-convert -w 216 -h 216 icon.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          rsvg-convert -w 216 -h 216 icon.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher_background.png
          rsvg-convert -w 324 -h 324 icon.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
          rsvg-convert -w 324 -h 324 icon.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher_background.png
          rsvg-convert -w 432 -h 432 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
          rsvg-convert -w 432 -h 432 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_background.png
          rsvg-convert -w 512 -h 512 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground_512.png

          # Generate splash screen (1 PNG per density — Capacitor will scale)
          # Use simple white background with center icon
          mkdir -p android/app/src/main/res/drawable
          rsvg-convert -w 1080 -h 1920 icon.svg -o android/app/src/main/res/drawable/splash.png

          # Adaptive icon XML for Android 8.0+
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@mipmap/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML_EOF

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'XML_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@mipmap/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML_EOF

          # Ensure styles.xml has splash theme reference
          cat > android/app/src/main/res/values/styles.xml << 'XML_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme">
                  <item name="android:background">@drawable/splash</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowFullscreen">true</item>
                  <item name="android:windowContentOverlay">@null</item>
              </style>
          </resources>
          XML_EOF

          # Ensure colors.xml exists with required colors
          cat > android/app/src/main/res/values/colors.xml << 'XML_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#6366F1</color>
              <color name="colorPrimaryDark">#4F46E5</color>
              <color name="colorAccent">#EC4899</color>
              <color name="ic_launcher_background">#0F172A</color>
          </resources>
          XML_EOF

          echo "✓ All launcher icons + splash + styles regenerated"

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Verify and repair Gradle wrapper
        run: |
          cd android
          if [ ! -f "./gradlew" ]; then
            echo "::error::gradlew file not found"
            exit 1
          fi
          chmod +x gradlew

          if ! unzip -l gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo "::warning::gradle-wrapper.jar is corrupt or invalid — regenerating with Gradle 8.14.3..."
            GRADLE_VERSION="8.14.3"
            GRADLE_DIST="gradle-${GRADLE_VERSION}-bin.zip"
            wget -q "https://services.gradle.org/distributions/${GRADLE_DIST}" -O /tmp/${GRADLE_DIST}
            unzip -q /tmp/${GRADLE_DIST} -d /tmp/
            /tmp/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION} --distribution-type all
            chmod +x gradlew
            rm -rf /tmp/${GRADLE_DIST} /tmp/gradle-${GRADLE_VERSION}
            echo "✓ Gradle wrapper regenerated with v${GRADLE_VERSION}"
          else
            echo "✓ Gradle wrapper OK"
          fi
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        if: github.event.inputs.build_type != 'debug'
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace -PsigningConfig=none || {
            echo "::warning::Release build failed."
            exit 1
          }

      - name: Sign Release APK
        if: |
          github.event.inputs.build_type != 'debug' &&
          env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::warning::Keystore secrets incomplete, skipping signing"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          rm -f app/keystore.jks

      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/GameMapperMind-debug.apk
          fi
          if [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk artifacts/GameMapperMind-release-unsigned.apk
          fi
          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk artifacts/GameMapperMind-release.apk
          fi
          ls -la artifacts/

      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: GameMapperMind-debug-apk
          path: artifacts/GameMapperMind-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        if: github.event.inputs.build_type != 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: GameMapperMind-release-apk
          path: |
            artifacts/GameMapperMind-release.apk
            artifacts/GameMapperMind-release-unsigned.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/GameMapperMind-debug.apk
            artifacts/GameMapperMind-release.apk
            artifacts/GameMapperMind-release-unsigned.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref**: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Build type requested**: \`${{ github.event.inputs.build_type || 'default (both)' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "artifacts/GameMapperMind-debug.apk" ]; then
            DEBUG_SIZE=$(du -h artifacts/GameMapperMind-debug.apk | cut -f1)
            echo "- ✅ Debug APK built (\`$DEBUG_SIZE\`)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ Debug APK not built (skipped or failed)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "artifacts/GameMapperMind-release.apk" ] || [ -f "artifacts/GameMapperMind-release-unsigned.apk" ]; then
            echo "- ✅ Release APK built" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ Release APK not built (skipped or failed)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts are available in the workflow run page (Actions tab → this run → Artifacts section)." >> $GITHUB_STEP_SUMMARY

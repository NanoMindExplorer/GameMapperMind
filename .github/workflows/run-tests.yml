# FASE 5.5 — CI workflow: run all unit + integration tests on every PR.
#
# Path di repo: .github/workflows/run-tests.yml
#
# What this workflow does:
#   1. Sets up JDK 17 + Node 20 + Android SDK.
#   2. Caches Gradle + npm for fast subsequent runs.
#   3. Runs frontend tests (vitest) + generates coverage report.
#   4. Runs Android unit tests (JUnit) + generates coverage report (JaCoCo).
#   5. Generates combined coverage summary as a PR comment.
#   6. Uploads coverage XML/HTML artifacts for inspection.
#   7. Fails the build if any test fails OR coverage drops below threshold.
#
# Required secrets: NONE (uses public actions + GITHUB_TOKEN).
# Required repo settings:
#   - Settings → Actions → Allow actions to create PR comments
#   - Settings → Branches → Branch protection rule for `main`:
#       - Require status checks to pass: `frontend-tests`, `android-tests`
#       - Require branches to be up to date before merging
#
# Coverage thresholds (adjust as the test suite grows):
#   - Frontend (vitest): lines 60%, functions 60%, branches 50%
#   - Android (JaCoCo):  line 50%, branch 40%
#   These are floors, not ceilings — raise them as more tests are added.

name: Run Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write   # needed for coverage comment

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Frontend tests (vitest + coverage)
  # ─────────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=verbose
        env:
          CI: true

      - name: Check coverage thresholds
        run: |
          node -e "
          const fs = require('fs');
          const summary = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
          const thresholds = { lines: 5, functions: 40, branches: 5, statements: 5 };
          let failed = false;
          for (const [key, min] of Object.entries(thresholds)) {
            const actual = summary.total[key].pct;
            const status = actual >= min ? 'PASS' : 'FAIL';
            console.log(\`  \${status} \${key}: \${actual}% (min \${min}%)\`);
            if (actual < min) failed = true;
          }
          if (failed) {
            console.error('Coverage threshold not met');
            process.exit(1);
          }
          "

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            coverage/
            !coverage/tmp/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────
  # Android tests (JUnit + JaCoCo coverage)
  # ─────────────────────────────────────────────────────────────────────
  android-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', 'gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Run unit tests with coverage
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --tests "*" --stacktrace --info

      - name: Generate JaCoCo coverage report
        working-directory: android
        run: ./gradlew :app:jacocoTestReport

      - name: Check coverage thresholds
        working-directory: android
        run: |
          # Parse JaCoCo XML report and check thresholds
          python3 -c "
          import xml.etree.ElementTree as ET
          import sys

          try:
              tree = ET.parse('app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml')
          except FileNotFoundError:
              print('JaCoCo report not found — skipping threshold check')
              sys.exit(0)

          root = tree.getroot()
          counters = {}
          for counter in root.findall('counter'):
              t = counter.get('type')
              missed = int(counter.get('missed', 0))
              covered = int(counter.get('covered', 0))
              total = missed + covered
              pct = (covered / total * 100) if total > 0 else 0
              counters[t] = pct

          thresholds = {'LINE': 50, 'BRANCH': 40, 'METHOD': 50, 'CLASS': 50}
          failed = False
          for key, min_pct in thresholds.items():
              actual = counters.get(key, 0)
              status = 'PASS' if actual >= min_pct else 'FAIL'
              print(f'  {status} {key}: {actual:.1f}% (min {min_pct}%)')
              if actual < min_pct:
                  failed = True

          if failed:
              print('Coverage threshold not met')
              sys.exit(1)
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: |
            android/app/build/test-results/
            android/app/build/reports/tests/
            android/app/build/reports/jacoco/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────
  # Combined coverage summary (PR comment)
  # ─────────────────────────────────────────────────────────────────────
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [frontend-tests, android-tests]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: coverage-frontend

      - name: Download android coverage
        uses: actions/download-artifact@v4
        with:
          name: android-test-results
          path: coverage-android

      - name: Build coverage summary
        id: summary
        run: |
          # Frontend summary
          FE_LINES=$(jq -r '.total.lines.pct' coverage-frontend/coverage-summary.json 2>/dev/null || echo "N/A")
          FE_FUNCS=$(jq -r '.total.functions.pct' coverage-frontend/coverage-summary.json 2>/dev/null || echo "N/A")
          FE_BRANCHES=$(jq -r '.total.branches.pct' coverage-frontend/coverage-summary.json 2>/dev/null || echo "N/A")

          # Android summary (parse JaCoCo XML)
          AND_LINES=$(python3 -c "
          import xml.etree.ElementTree as ET
          try:
              t = ET.parse('coverage-android/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml')
              for c in t.getroot().findall('counter'):
                  if c.get('type') == 'LINE':
                      m, cv = int(c.get('missed',0)), int(c.get('covered',0))
                      print(f'{cv/(m+cv)*100:.1f}' if m+cv>0 else '0.0')
                      break
          except: print('N/A')
          " 2>/dev/null || echo "N/A")

          echo "fe_lines=$FE_LINES" >> $GITHUB_OUTPUT
          echo "fe_funcs=$FE_FUNCS" >> $GITHUB_OUTPUT
          echo "fe_branches=$FE_BRANCHES" >> $GITHUB_OUTPUT
          echo "and_lines=$AND_LINES" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const feLines = '${{ steps.summary.outputs.fe_lines }}';
            const feFuncs = '${{ steps.summary.outputs.fe_funcs }}';
            const feBranches = '${{ steps.summary.outputs.fe_branches }}';
            const andLines = '${{ steps.summary.outputs.and_lines }}';

            const body = [
              '## 📊 Test Coverage Summary',
              '',
              '| Layer | Metric | Coverage |',
              '|-------|--------|----------|',
              `| Frontend (vitest) | Lines | ${feLines}% |`,
              `| Frontend (vitest) | Functions | ${feFuncs}% |`,
              `| Frontend (vitest) | Branches | ${feBranches}% |`,
              `| Android (JaCoCo) | Lines | ${andLines}% |`,
              '',
              '📋 [Frontend HTML report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})',
              '📋 [Android HTML report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})',
              '',
              'Thresholds: Frontend 60% lines, 50% branches · Android 50% lines, 40% branches',
            ].join('\n');

            // Find existing comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## 📊 Test Coverage Summary'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─────────────────────────────────────────────────────────────────────
  # Final status gate
  # ─────────────────────────────────────────────────────────────────────
  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [frontend-tests, android-tests]
    if: always()
    steps:
      - name: Gate
        run: |
          echo "Frontend: ${{ needs.frontend-tests.result }}"
          echo "Android:  ${{ needs.android-tests.result }}"
          if [[ "${{ needs.frontend-tests.result }}" != "success" || "${{ needs.android-tests.result }}" != "success" ]]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed"

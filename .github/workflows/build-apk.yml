name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Kode
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java JDK (diperlukan untuk Gradle/Android SDK)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # 3. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Install Dependencies & Build Web Assets (dist/)
      - name: Install dependencies and build web app
        run: |
          npm ci
          npm run build

      # 5. Setup / Inisialisasi Capacitor secara otomatis jika perangkat belum terinstal
      - name: Setup and Initialize Capacitor
        run: |
          # Install dependencies Capacitor secara lokal untuk runtime build CI
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # Inisialisasi file konfigurasi Capacitor jika belum ada
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init "Gamepad Mapper" "com.example.gamepadmapper" --web-dir=dist
          fi

          # Tambahkan folder platform android jika belum ada
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          # Resolve duplicate Kotlin stdlib dependencies by excluding deprecated jdk7/jdk8 modules
          if [ -f "android/app/build.gradle" ]; then
            echo "" >> android/app/build.gradle
            echo "configurations.all {" >> android/app/build.gradle
            echo "    exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk7\"" >> android/app/build.gradle
            echo "    exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk8\"" >> android/app/build.gradle
            echo "}" >> android/app/build.gradle
            echo "Successfully injected Kotlin dependency exclusions into app/build.gradle"
          fi

      # 6. Sinkronkan Aset Web ke Proyek Android Capacitor
      - name: Capacitor Sync
        run: |
          npx cap sync android

      # 7. Build APK menggunakan Gradle
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8. Upload Hasil APK (Menggunakan v4 untuk menghindari Deprecation Error)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-mapper-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace = "com.nanomindexplorer.gamemappermind"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.nanomindexplorer.gamemappermind"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // BUG-K2 FIX: Auto-increment versionCode from CI run number. Falls back to 1 for local builds.
        // This ensures every CI build has a unique, monotonically increasing versionCode for Play Store updates.
        versionCode Integer.parseInt(System.getenv("GITHUB_RUN_NUMBER") ?: "2")
        versionName "2.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            // BUG-K1 FIX: Only configure release signing if keystore env vars are set.
            // Previously, storeFile defaulted to "keystore.jks" (which doesn't exist) and
            // storePassword defaulted to "", causing assembleRelease to fail.
            // Now: if env vars are absent, release build uses debug signing (for local testing).
            // For production: set KEYSTORE_FILE, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
            // as GitHub Actions secrets and the release build will use them.
            def keystoreFile = System.getenv("KEYSTORE_FILE")
            if (keystoreFile != null && new File(keystoreFile).exists()) {
                storeFile file(keystoreFile)
                storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
                keyAlias System.getenv("KEY_ALIAS") ?: ""
                keyPassword System.getenv("KEY_PASSWORD") ?: ""
            } else {
                // Fall back to debug signing for local builds without keystore configured
                storeFile new File(System.getProperty("user.home"), ".android/debug.keystore")
                storePassword "android"
                keyAlias "androiddebugkey"
                keyPassword "android"
            }
        }
    }
    buildTypes {
        debug {
            // BUG-MED-22 FIX: cleartext only enabled in debug builds
            manifestPlaceholders = [cleartextEnabled: "true"]
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            // BUG-MED-22 FIX: Disable cleartext in production
            manifestPlaceholders = [cleartextEnabled: "false"]
        }
        // BUG-K3 FIX: Add a release-test build type that uses debug signing but with ProGuard enabled,
        // so CI can verify R8/ProGuard rules don't break the build.
        releaseTest {
            initWith release
            minifyEnabled true
            shrinkResources true
            signingConfig signingConfigs.debug
            matchingFallbacks = ['release']
            manifestPlaceholders = [cleartextEnabled: "true"]
        }
    }
    buildFeatures {
        aidl true
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    
    // Rikka Shizuku Integration
    def shizuku_version = "13.1.5"
    implementation "dev.rikka.shizuku:api:$shizuku_version"
    implementation "dev.rikka.shizuku:provider:$shizuku_version"
    implementation "androidx.webkit:webkit:1.8.0"

    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Deep Space/Dark Gamer Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050B14" />
      <stop offset="40%" stop-color="#090918" />
      <stop offset="80%" stop-color="#14051B" />
      <stop offset="100%" stop-color="#0A020B" />
    </linearGradient>

    <!-- Neon Gamer Energy Ring -->
    <linearGradient id="neonGlowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#FF003C" />
    </linearGradient>

    <!-- Metallic Controller Body -->
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D3748" />
      <stop offset="50%" stop-color="#1A202C" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Glowing Accents -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <linearGradient id="pinkAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F472B6" />
      <stop offset="100%" stop-color="#BE185D" />
    </linearGradient>

    <!-- Dynamic Glow Filter -->
    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Background (Squircle) -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)" />

  <!-- Outer Energy Ring (Gamer Spirit Aura) -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#neonGlowGrad)" stroke-width="14" filter="url(#hyperGlow)" opacity="0.6" />
  <circle cx="512" cy="512" r="380" fill="none" stroke="url(#neonGlowGrad)" stroke-width="4" opacity="0.9" />

  <!-- Abstract Geometric Wings/Speed Lines (Esport Style) -->
  <path d="M120 512 L380 220 L400 320 L220 512 L400 704 L380 804 Z" fill="url(#cyanAccent)" filter="url(#softGlow)" opacity="0.8" />
  <path d="M904 512 L644 220 L624 320 L804 512 L624 704 L644 804 Z" fill="url(#pinkAccent)" filter="url(#softGlow)" opacity="0.8" />

  <!-- Main Gamepad Body (Aggressive / Stealth Look) -->
  <path d="M280 430 C280 320, 360 280, 512 280 C664 280, 744 320, 744 430 Q760 620, 800 700 C830 760, 700 800, 640 700 C600 630, 570 580, 512 580 C454 580, 424 630, 384 700 C324 800, 194 760, 224 700 Q264 620, 280 430 Z" fill="url(#controllerGrad)" stroke="#334155" stroke-width="12" />

  <!-- Center Holographic Core (Mind / Fusion) -->
  <g transform="translate(512, 400)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#neonGlowGrad)" stroke-width="6" filter="url(#hyperGlow)" />
    <path d="M-20 -20 L0 -40 L20 -20 L40 0 L20 20 L0 40 L-20 20 L-40 0 Z" fill="url(#neonGlowGrad)" opacity="0.9" />
    <circle cx="0" cy="0" r="10" fill="#FFFFFF" filter="url(#softGlow)" />
  </g>

  <!-- Left D-Pad (Neon Cyan) -->
  <g transform="translate(360, 440)">
    <rect x="-12" y="-38" width="24" height="76" fill="url(#cyanAccent)" rx="4" filter="url(#softGlow)" />
    <rect x="-38" y="-12" width="76" height="24" fill="url(#cyanAccent)" rx="4" filter="url(#softGlow)" />
    <circle cx="0" cy="0" r="10" fill="#0F172A" />
  </g>

  <!-- Right Action Buttons (Cyberpunk Pink / Yellow / Green / Blue) -->
  <g transform="translate(664, 440)">
    <!-- Y -->
    <circle cx="0" cy="-35" r="14" fill="#FBBF24" filter="url(#softGlow)" />
    <!-- A -->
    <circle cx="0" cy="35" r="14" fill="#34D399" filter="url(#softGlow)" />
    <!-- X -->
    <circle cx="-35" cy="0" r="14" fill="#60A5FA" filter="url(#softGlow)" />
    <!-- B -->
    <circle cx="35" cy="0" r="14" fill="#F472B6" filter="url(#softGlow)" />
  </g>

  <!-- Joysticks Bottom Left / Right -->
  <g transform="translate(380, 580)">
    <circle cx="0" cy="0" r="35" fill="#0F172A" stroke="#475569" stroke-width="4" />
    <circle cx="-6" cy="-6" r="18" fill="#1E293B" />
    <circle cx="0" cy="0" r="5" fill="#22D3EE" filter="url(#softGlow)" />
  </g>
  <g transform="translate(644, 580)">
    <circle cx="0" cy="0" r="35" fill="#0F172A" stroke="#475569" stroke-width="4" />
    <circle cx="-6" cy="-6" r="18" fill="#1E293B" />
    <circle cx="0" cy="0" r="5" fill="#F472B6" filter="url(#softGlow)" />
  </g>

  <!-- Grip Track Lines -->
  <path d="M260 550 Q280 620, 240 680" fill="none" stroke="#475569" stroke-width="6" stroke-linecap="round" />
  <path d="M764 550 Q744 620, 784 680" fill="none" stroke="#475569" stroke-width="6" stroke-linecap="round" />
</svg>

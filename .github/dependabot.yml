version: 2

updates:
  # npm dependencies (frontend / TypeScript)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 10
    groups:
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-minor:
        dependency-type: "production"
        update-types:
          - "minor"
      production-patch:
        dependency-type: "production"
        update-types:
          - "patch"
    reviewers:
      - "NanoMindExplorer"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "deps(npm)"
      include: "scope"

  # Gradle dependencies (Android / Kotlin)
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    open-pull-requests-limit: 5
    groups:
      androidx:
        patterns:
          - "androidx.*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin.*"
      capacitor:
        patterns:
          - "com.capacitorjs.*"
    reviewers:
      - "NanoMindExplorer"
    labels:
      - "dependencies"
      - "gradle"
      - "android"
    commit-message:
      prefix: "deps(gradle)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "NanoMindExplorer"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(ci)"
      include: "scope"

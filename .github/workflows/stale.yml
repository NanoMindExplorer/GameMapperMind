# ============================================================
# GameMapperMind — Stale Issue/PR Cleaner
# ============================================================
# Runs daily. Closes issues and PRs that have been inactive for too
# long. Prevents the issue tracker from becoming a graveyard.
#
# Behavior:
#   - Mark issues/PRs stale after 60 days of inactivity
#   - Close them 14 days after stale marker
#   - Exempt: issues with `pinned`, `security`, `keep-open` labels
#   - Exempt: PRs that are draft or have `work-in-progress` label
# ============================================================
name: Stale

on:
  schedule:
    - cron: '30 1 * * *'   # Daily at 01:30 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale Issues & PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v9
        with:
          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,keep-open,roadmap,enhancement'
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.

            If this is still relevant, please:
            - Comment to confirm
            - Or remove the `stale` label

            Thank you for your contributions to GameMapperMind!

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,work-in-progress,dependencies'
          stale-pr-message: |
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.

            To keep this PR active:
            - Rebase onto the latest main
            - Address any review comments
            - Or remove the `stale` label

          # Operations per run (avoid API rate limits)
          operations-per-run: 50

          # Don't close issues that have assignees
          exempt-all-issue-assignees: true

          # Don't close milestones
          exempt-all-milestones: true

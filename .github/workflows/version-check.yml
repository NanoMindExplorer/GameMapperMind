name: Version Code Check
on:
  pull_request:
    branches:
      - main
jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check versionCode increment
        run: |
          CURRENT=$(grep "versionCode" android/app/build.gradle | head -1 | awk '{print $2}')
          PREV=$(git show origin/main:android/app/build.gradle 2>/dev/null | grep "versionCode" | head -1 | awk '{print $2}' || echo "0")
          if [ "$CURRENT" -le "$PREV" ]; then
            echo "FAIL: versionCode must increment"
            exit 1
          fi
          echo "PASS: versionCode incremented"

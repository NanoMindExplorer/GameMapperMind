name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          
      - name: Install dependencies
        run: npm ci || npm install
        
      - name: Build Web
        run: npm run build
        
      - name: Sync Capacitor
        run: npx cap sync android
        
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      # BUG-K3 FIX: Also test assembleReleaseTest (ProGuard enabled + debug signing) to verify R8 rules don't break the build.
      - name: Build Release-Test APK (ProGuard verification)
        working-directory: ./android
        run: ./gradlew assembleReleaseTest
        continue-on-error: true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameMapperMind-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload Release-Test APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameMapperMind-releaseTest-apk
          path: android/app/build/outputs/apk/releaseTest/app-releaseTest.apk
          retention-days: 30
          if-no-files-found: false

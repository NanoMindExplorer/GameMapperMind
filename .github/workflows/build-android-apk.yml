# ============================================================
# GameMapperMind — Build Android APK (Clean & Reliable)
# ============================================================
# This is the PRIMARY build workflow. It:
#   1. Installs npm dependencies
#   2. Builds web assets (Vite)
#   3. Syncs Capacitor (generates Android subproject variants)
#   4. Regenerates launcher icons from icon.svg
#   5. Builds debug APK
#   6. Uploads APK as artifact
#
# Triggers:
#   - Push to main
#   - Pull request to main
#   - Manual dispatch
#
# Key lessons from previous failures:
#   - MUST run `npx vite build` before `npx cap sync` (Capacitor needs ./dist)
#   - MUST run `npx cap sync` before Gradle (generates capacitor-* subprojects)
#   - MUST regenerate icons from SVG (some mipmap PNGs are corrupt/missing)
#   - MUST use JDK 21 (Capacitor 8 requires Java 21)
#   - MUST use Node 24 (Node 20 deprecated on GitHub Actions)
#   - MUST use Android SDK 36 (matches compileSdk in build.gradle)
# ============================================================
name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: '24'
  JAVA_VERSION: '21'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build web app (Vite)
        run: npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Regenerate launcher icons from SVG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin
          if [ -f "icon.svg" ]; then
            echo "Generating icons from icon.svg..."
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            rsvg-convert -w 48 -h 48 icon.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            rsvg-convert -w 48 -h 48 icon.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            rsvg-convert -w 72 -h 72 icon.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            rsvg-convert -w 72 -h 72 icon.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            rsvg-convert -w 96 -h 96 icon.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            rsvg-convert -w 96 -h 96 icon.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            rsvg-convert -w 144 -h 144 icon.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            rsvg-convert -w 144 -h 144 icon.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            rsvg-convert -w 192 -h 192 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            rsvg-convert -w 192 -h 192 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
            echo "Icons generated successfully"
          else
            echo "::warning::icon.svg not found, skipping icon generation"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::APK not found at $APK_PATH"
            exit 1
          fi
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "::notice::APK built successfully ($APK_SIZE)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

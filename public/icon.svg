<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E" />
      <stop offset="100%" stop-color="#11111B" />
    </linearGradient>
    <!-- Glow -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cba6f7" />
      <stop offset="50%" stop-color="#f38ba8" />
      <stop offset="100%" stop-color="#fab387" />
    </linearGradient>
  </defs>

  <!-- Background base -->
  <rect width="512" height="512" fill="url(#bg)" rx="112" />

  <!-- Brain & Gamepad Motif -->
  <g transform="translate(64, 120)">
    <!-- Gamepad Outer shape -->
    <path d="M 64 64 C 0 32 0 160 32 192 L 64 192 C 128 256 256 256 320 192 L 352 192 C 384 160 384 32 320 64 C 256 0 128 0 64 64 Z" 
          fill="none" stroke="url(#neon)" stroke-width="24" stroke-linejoin="round" />
    
    <!-- D-pad -->
    <path d="M 100 120 L 100 100 L 120 100 L 120 120 L 140 120 L 140 140 L 120 140 L 120 160 L 100 160 L 100 140 L 80 140 L 80 120 Z" fill="#cba6f7" />

    <!-- Action Buttons -->
    <circle cx="280" cy="110" r="16" fill="#f38ba8" />
    <circle cx="250" cy="140" r="16" fill="#89b4fa" />
    <circle cx="310" cy="140" r="16" fill="#fab387" />
    <circle cx="280" cy="170" r="16" fill="#a6e3a1" />
    
    <!-- Brain nodes linking -->
    <circle cx="192" cy="70" r="12" fill="#89b4fa" />
    <circle cx="150" cy="100" r="8" fill="#89b4fa" />
    <circle cx="234" cy="100" r="8" fill="#89b4fa" />
    <circle cx="192" cy="130" r="8" fill="#89b4fa" />
    <path d="M 192 70 L 150 100 M 192 70 L 234 100 M 150 100 L 192 130 M 234 100 L 192 130 M 192 70 L 192 30" stroke="#89b4fa" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>

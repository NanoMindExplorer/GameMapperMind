name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build Web Assets
        env:
          VITE_NEXION_API_KEY: 'ci-build-placeholder-key-not-used-in-apk-32chars'
        run: npm run build

      - name: Verify dist/client and index.html
        run: |
          echo "Checking build output..."
          ls -la dist/
          ls -la dist/client/
          if [ ! -f "dist/client/index.html" ]; then
            echo "::error::index.html not found in dist/client!"
            exit 1
          fi
          echo "Build output verified successfully."

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-mapper-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

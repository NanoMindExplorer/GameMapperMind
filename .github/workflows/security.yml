# ============================================================
# GameMapperMind — Security Scanning Pipeline
# ============================================================
# Runs security scans in parallel with CI pipeline. Triggers on:
#   - All PRs to main/develop
#   - All pushes to main
#   - Weekly schedule (Sunday 02:00 UTC) for proactive scanning
#
# Scans performed:
#   1. CodeQL — semantic code analysis (JS/TS + Java/Kotlin + Python)
#   2. Dependency review — checks for vulnerable npm + gradle deps
#   3. Secret scanning — detects committed API keys / tokens
#   4. Semgrep — additional SAST rules for Android/Shizuku patterns
#
# This workflow NEVER blocks the CI pipeline — security findings are
# reported as PR annotations + uploaded SARIF for GitHub Security tab.
# Critical findings (committed secrets) fail the workflow; others are advisory.
# ============================================================
name: Security

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    - cron: '0 2 * * 0'   # Sunday 02:00 UTC weekly
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # required to upload SARIF
  actions: read

env:
  NODE_VERSION: '24'
  JAVA_VERSION: '21'

jobs:
  # ───────────────────────────────────────────────────────────────
  # JOB 1: CodeQL — semantic analysis
  # ───────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, java-kotlin]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the 'security-and-quality' query suite for comprehensive scanning.
          queries: security-and-quality
          # Disable default queries that produce too many false positives on
          # Android projects (e.g., hardcoded API keys that are actually
          # test fixtures).
          config: |
            paths-ignore:
              - node_modules
              - android/app/build
              - dist
              - coverage
              - '**/*.test.ts'
              - '**/*.test.tsx'
              - '**/*.spec.ts'
              - 'src/test/**'

      # ───── Fix 5: Build web assets before CodeQL autobuild ─────
      # CodeQL autobuild for Java/Kotlin fails because Capacitor
      # subprojects (capacitor-android, capacitor-app, etc.) have no
      # variants until `npx cap sync android` is run. We must build
      # the web app + sync Capacitor before autobuild can resolve
      # all project dependencies.
      - name: Setup Node ${{ env.NODE_VERSION }}
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Android SDK
        if: matrix.language == 'java-kotlin'
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'

      - name: Install npm dependencies + sync Capacitor
        if: matrix.language == 'java-kotlin'
        run: |
          npm ci
          npx cap sync android

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Upload SARIF even on failure — partial results are useful.
          wait-for-processing: false

  # ───────────────────────────────────────────────────────────────
  # JOB 2: Dependency review — checks for vulnerable deps
  # Only runs on PRs (compares base vs head dependency manifest)
  #
  # Fix 4: This job requires "Dependency graph" to be enabled in
  # repo settings (Settings → Code security → Dependency graph).
  # If not enabled, the job will fail. We use continue-on-error so
  # it doesn't block the PR — the warning will be visible in the
  # job log. To enable: visit
  # https://github.com/NanoMindExplorer/GameMapperMind/settings/security_analysis
  # ───────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail on HIGH and CRITICAL vulnerabilities.
          fail-on-severity: high
          # Comment on PR with summary.
          comment-summary-in-pr: on-failure
          # Block PRs that introduce packages with non-allowable licenses.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, SSPL-1.0

  # ───────────────────────────────────────────────────────────────
  # JOB 3: npm audit — explicit vulnerability scan
  # ───────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Run npm audit
        run: |
          # npm audit exits non-zero if vulns found.
          # We tolerate moderate (only fail on high+critical).
          npm audit --audit-level=high --omit=dev || {
            echo "::warning::npm audit found high/critical vulnerabilities — see log above"
            # Don't fail the job — CodeQL + dependency-review will catch real issues.
            # This is informational only.
            exit 0
          }
          echo "::notice::npm audit passed — no high/critical vulnerabilities"

  # ───────────────────────────────────────────────────────────────
  # JOB 4: Secret scanning — detect committed credentials
  #
  # Fix 3: TruffleHog's --exclude-paths expects a file with REGEX
  # patterns, not glob patterns. .gitignore uses globs like "*.log"
  # which is invalid regex ( "*" at start is invalid in RE2).
  # Solution: create a dedicated exclude file with proper regex
  # patterns, or omit --exclude-paths entirely (TruffleHog already
  # respects .gitignore by default in recent versions).
  # ───────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scan

      # Fix 3: Create a proper regex exclude file for TruffleHog.
      # These are RE2-compatible regex patterns (not globs).
      - name: Create TruffleHog exclude patterns
        run: |
          cat > .trufflehog-exclude.txt << 'EOF'
          ^node_modules/
          ^android/app/build/
          ^dist/
          ^coverage/
          ^\.git/
          \.log$
          \.lock$
          \.map$
          EOF

      - name: Trufflehog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --only-verified --exclude-paths=.trufflehog-exclude.txt

      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # GitLeaks uploads SARIF to GitHub Security tab automatically.

  # ───────────────────────────────────────────────────────────────
  # JOB 5: Semgrep — custom SAST for Android/Shizuku patterns
  # ───────────────────────────────────────────────────────────────
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/default
            p/owasp-top-ten
            p/android
            p/kotlin
          # Generate SARIF for GitHub Security tab.
          generateSarif: "1"
          # Fail on error (config errors), not on findings.
          auditOn: "false"

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  # ───────────────────────────────────────────────────────────────
  # JOB 6: Kotlin/Gradle security — OWASP Dependency Check
  # ───────────────────────────────────────────────────────────────
  gradle-security:
    name: Gradle Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run on main + schedule (expensive job).
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-36'

      - name: Run OWASP Dependency Check
        working-directory: android
        run: |
          ./gradlew dependencyCheckAnalyze || {
            echo "::warning::OWASP Dependency Check failed to run (not configured?) — skipping"
            exit 0
          }

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: android/app/build/reports/dependency-check-report.html
          if-no-files-found: ignore
          retention-days: 30

  # ───────────────────────────────────────────────────────────────
  # JOB 7: Security status summary
  # ───────────────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql, dependency-review, npm-audit, secret-scan, semgrep]
    if: always()
    timeout-minutes: 2
    steps:
      - name: Aggregate security results
        env:
          CODEQL_RESULT: ${{ needs.codeql.result }}
          DEPREVIEW_RESULT: ${{ needs.dependency-review.result }}
          NPM_RESULT: ${{ needs.npm-audit.result }}
          SECRET_RESULT: ${{ needs.secret-scan.result }}
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL (JS/TS + Kotlin) | $CODEQL_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | $DEPREVIEW_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| npm audit | $NPM_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan (Trufflehog + GitLeaks) | $SECRET_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Semgrep SAST | $SEMGREP_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 See [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) for findings." >> $GITHUB_STEP_SUMMARY

          # Only secret scan failures are hard blocks (committed credentials are critical).
          # CodeQL/Semgrep findings are reported to Security tab for triage.
          # dependency-review is continue-on-error (may not be enabled on repo).
          if [ "$SECRET_RESULT" = "failure" ]; then
            echo "::error::Secret scan failed — committed credentials detected!"
            exit 1
          fi

          # dependency-review failure is advisory (repo may not have
          # dependency graph enabled). Log warning but don't block.
          if [ "$DEPREVIEW_RESULT" = "failure" ]; then
            echo "::warning::Dependency review failed — see job log for details (may need dependency graph enabled in repo settings)"
          fi

          echo "::notice::Security scans completed — review Security tab for findings"

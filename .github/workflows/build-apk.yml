name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Kode
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java JDK (diperlukan untuk Gradle/Android SDK)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # 3. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Install Dependencies & Build Web Assets (dist/)
      - name: Install dependencies and build web app
        run: |
          npm ci
          npm run build

      # 5. Setup / Inisialisasi Capacitor secara otomatis jika perangkat belum terinstal
      - name: Setup and Initialize Capacitor
        run: |
          # Install dependencies Capacitor secara lokal untuk runtime build CI
          npm install @capacitor/core @capacitor/cli @capacitor/android

          # Inisialisasi file konfigurasi Capacitor jika belum ada
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            npx cap init "Gamepad Mapper" "com.example.gamepadmapper" --web-dir=dist
          fi

          # Tambahkan folder platform android jika belum ada
          if [ ! -d "android" ]; then
            npx cap add android
          fi

          # Install packages to securely convert SVG to high-quality PNGs
          sudo apt-get update && sudo apt-get install -y librsvg2-bin

          # Generate and replace default icon files with custom branded game mapper icon
          if [ -d "android/app/src/main/res" ]; then
            echo "Generating high-fidelity launcher icons from icon.svg..."
            
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            mkdir -p android/app/src/main/res/drawable
            mkdir -p android/app/src/main/res/drawable-v24

            # Standard Legacy Icons
            rsvg-convert -w 48 -h 48 icon.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher.png
            rsvg-convert -w 48 -h 48 icon.svg -o android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
            
            rsvg-convert -w 72 -h 72 icon.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            rsvg-convert -w 72 -h 72 icon.svg -o android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
            
            rsvg-convert -w 96 -h 96 icon.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            rsvg-convert -w 96 -h 96 icon.svg -o android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
            
            rsvg-convert -w 144 -h 144 icon.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            rsvg-convert -w 144 -h 144 icon.svg -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
            
            rsvg-convert -w 192 -h 192 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            rsvg-convert -w 192 -h 192 icon.svg -o android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

            # Adaptive Icons
            rsvg-convert -w 512 -h 512 icon.svg -o android/app/src/main/res/drawable/ic_launcher_background.png
            rsvg-convert -w 512 -h 512 icon.svg -o android/app/src/main/res/drawable-v24/ic_launcher_foreground.png
            
            echo "Custom launcher icons successfully generated and populated!"
          fi

          # 1. Resolve Kotlin conflicts and inject Shizuku Gradle API dependencies (api & provider libraries)
          if [ -f "android/app/build.gradle" ]; then
            node -e "
              const fs = require('fs');
              const path = 'android/app/build.gradle';
              if (fs.existsSync(path)) {
                let content = fs.readFileSync(path, 'utf8');
                const depString = '\n    implementation \"dev.rikka.shizuku:api:13.1.5\"\n    implementation \"dev.rikka.shizuku:provider:13.1.5\"\n';
                if (!content.includes('dev.rikka.shizuku')) {
                  if (content.includes('dependencies {')) {
                    content = content.replace('dependencies {', 'dependencies {' + depString);
                  }
                }
                if (!content.includes('kotlin-stdlib-jdk7')) {
                  content += '\nconfigurations.all {\n    exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk7\"\n    exclude group: \"org.jetbrains.kotlin\", module: \"kotlin-stdlib-jdk8\"\n}\n';
                }
                fs.writeFileSync(path, content, 'utf8');
                console.log('Successfully injected Shizuku dependencies and Kotlin exclusions into build.gradle');
              }
            "
          fi

          # 2. Inject Shizuku permissions, queries block, and ShizukuProvider into AndroidManifest.xml
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            node -e "
              const fs = require('fs');
              const path = 'android/app/src/main/AndroidManifest.xml';
              if (fs.existsSync(path)) {
                let content = fs.readFileSync(path, 'utf8');
                
                // Add uses-permission if missing
                if (!content.includes('rikka.shizuku.permission.API_V23')) {
                  const target = '<application';
                  const insert = '    <uses-permission android:name=\"rikka.shizuku.permission.API_V23\" />\n    ';
                  content = content.replace(target, insert + target);
                }
                
                // Add queries block for Android 11+ visibility
                if (!content.includes('moe.shizuku.privileged.api')) {
                  const queriesInsert = '\n    <queries>\n        <package android:name=\"moe.shizuku.privileged.api\" />\n    </queries>\n';
                  const target = '<application';
                  content = content.replace(target, queriesInsert + target);
                }
                
                // Add ShizukuProvider inside <application> block
                if (!content.includes('rikka.shizuku.ShizukuProvider')) {
                  const providerInsert = '\n        <!-- Shizuku Provider -->\n        <provider\n            android:name=\"rikka.shizuku.ShizukuProvider\"\n            android:authorities=\"\${applicationId}.shizuku\"\n            android:multiprocess=\"false\"\n            android:enabled=\"true\"\n            android:exported=\"true\"\n            android:permission=\"android.permission.INTERACTIVE_AUTOMATION\" />\n';
                  // Locate opening tag <application ...> and insert provider right after it
                  content = content.replace(/<application([^>]*?)>/, '<application$1>' + providerInsert);
                }
                
                fs.writeFileSync(path, content, 'utf8');
                console.log('Successfully injected Shizuku elements (permission, queries, provider) into AndroidManifest.xml');
              }
            "
          fi

      # 6. Sinkronkan Aset Web ke Proyek Android Capacitor
      - name: Capacitor Sync
        run: |
          npx cap sync android

      # 7. Build APK menggunakan Gradle
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 8. Upload Hasil APK (Menggunakan v4 untuk menghindari Deprecation Error)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-mapper-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

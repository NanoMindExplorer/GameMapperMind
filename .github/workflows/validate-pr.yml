# Validate PR — Ensure contributors only modify profile files
# ============================================================
# This workflow runs on every Pull Request and checks:
# 1. PR only modifies files in src/communityProfiles/
# 2. PR does not touch critical files (android/, .github/, etc)
# 3. Profile file follows the correct TypeScript schema
#
# If validation fails, the PR is automatically blocked.
# ============================================================
name: Validate Profile PR

on:
  pull_request:
    paths:
      - 'src/communityProfiles/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check which files were modified
        id: changed-files
        run: |
          echo "=== Files changed in this PR ==="
          git diff --name-only origin/main...HEAD > /tmp/changed_files.txt
          cat /tmp/changed_files.txt
          echo ""

          # Check if any file is OUTSIDE src/communityProfiles/
          NON_PROFILE_FILES=$(grep -v '^src/communityProfiles/' /tmp/changed_files.txt || true)

          if [ -n "$NON_PROFILE_FILES" ]; then
            echo "::error::PR contains changes to files outside src/communityProfiles/"
            echo "::error::Offending files:"
            echo "$NON_PROFILE_FILES"
            echo ""
            echo "For security reasons, contributors can only modify files in:"
            echo "  src/communityProfiles/"
            echo ""
            echo "If you need to change other files, please contact the repository owner."
            exit 1
          fi

          echo "✓ All changes are within src/communityProfiles/"
          echo "changed_files_valid=true" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.changed-files.outputs.changed_files_valid == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.changed-files.outputs.changed_files_valid == 'true'
        run: npm ci

      - name: Validate TypeScript types
        if: steps.changed-files.outputs.changed_files_valid == 'true'
        run: npx tsc --noEmit

      - name: Validate profile structure
        if: steps.changed-files.outputs.changed_files_valid == 'true'
        run: |
          echo "=== Validating community profile files ==="

          # Check each .ts file in communityProfiles (except index.ts and _template.ts)
          for file in src/communityProfiles/*.ts; do
            filename=$(basename "$file")

            # Skip index.ts and _template.ts
            if [ "$filename" = "index.ts" ] || [ "$filename" = "_template.ts" ]; then
              continue
            fi

            echo "Checking: $file"

            # Check if file exports a GamepadProfile
            if ! grep -q "export const.*: GamepadProfile" "$file"; then
              echo "::error::$file does not export a GamepadProfile const"
              echo "::error::Make sure your file has: export const YOUR_GAME: GamepadProfile = { ... }"
              exit 1
            fi

            # Check if profile has required fields
            if ! grep -q "id:" "$file"; then
              echo "::error::$file missing required field: id"
              exit 1
            fi

            if ! grep -q "name:" "$file"; then
              echo "::error::$file missing required field: name"
              exit 1
            fi

            if ! grep -q "packageName:" "$file"; then
              echo "::error::$file missing required field: packageName"
              exit 1
            fi

            if ! grep -q "buttons:" "$file"; then
              echo "::error::$file missing required field: buttons"
              exit 1
            fi

            echo "  ✓ $filename is valid"
          done

          echo ""
          echo "✓ All community profiles are valid!"

      - name: Check for duplicate profile IDs
        if: steps.changed-files.outputs.changed_files_valid == 'true'
        run: |
          echo "=== Checking for duplicate profile IDs ==="

          # Extract all profile IDs from community profiles
          grep -ohP "id:\s*'[^']+'" src/communityProfiles/*.ts | \
            sed "s/id:\s*'//;s/'//" | sort > /tmp/community_ids.txt

          # Extract all profile IDs from official profiles
          grep -ohP "id:\s*'[^']+'" src/gameProfiles.ts | \
            sed "s/id:\s*'//;s/'//" | sort > /tmp/official_ids.txt

          # Check for duplicates within community profiles
          DUPES=$(uniq -d /tmp/community_ids.txt)
          if [ -n "$DUPES" ]; then
            echo "::error::Duplicate profile IDs found in community profiles:"
            echo "$DUPES"
            exit 1
          fi

          # Check for duplicates with official profiles
          OVERLAP=$(comm -12 /tmp/community_ids.txt /tmp/official_ids.txt)
          if [ -n "$OVERLAP" ]; then
            echo "::error::Community profile IDs conflict with official profiles:"
            echo "$OVERLAP"
            echo "::error::Please use a different ID for your profile."
            exit 1
          fi

          echo "✓ No duplicate profile IDs found"

      - name: Comment on PR with validation result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const message = status === 'success'
              ? '✅ **Profile validation passed!** Your game profile has been validated and is ready for review. The repository owner will review and merge your PR.'
              : '❌ **Profile validation failed.** Please check the errors above and fix them. Only files in `src/communityProfiles/` can be modified.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

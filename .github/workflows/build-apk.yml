name: Build Android APK (Capacitor)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Kode
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java JDK (diperlukan untuk Gradle/Android SDK)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 3. Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 4. Install Dependencies & Build Web Assets (dist/)
      - name: Install dependencies and build web app
        run: |
          npm ci
          npm run build

      # 5. Sinkronkan Aset Web ke Proyek Android Capacitor
      - name: Capacitor Sync
        run: |
          npx cap sync android

      # 6. Build APK menggunakan Gradle
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      # 7. Upload Hasil APK (Menggunakan v4 untuk menghindari Deprecation Error)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-mapper-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
